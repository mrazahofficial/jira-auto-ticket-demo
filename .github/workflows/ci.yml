name: CI Security Scan

on:
  push:
    branches:
      - main

jobs:
  scan-and-create-ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run Security Scan
        id: scan
        # This is your 'problem' step that fails on purpose
        run: python security_scan.py
        continue-on-error: true
        
      - name: Create Jira Ticket
        # Using failure() is more robust for checking if the previous step crashed
        if: always() && (steps.scan.outcome == 'failure')
        run: python create_jira_ticket.py
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
